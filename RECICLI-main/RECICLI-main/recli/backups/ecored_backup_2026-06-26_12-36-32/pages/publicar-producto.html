<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Publicar producto</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/responsive.css"></head><body><header class="navbar" data-nav></header><main><section class="page-hero"><div class="container"><h1>Publicar producto usado</h1><p class="lead">Fotos claras, reputacion visible y recomendaciones de seguridad.</p></div></section><section class="section"><div class="container grid two"><form class="card form"><label>Titulo<input required placeholder="Laptop, escritorio, silla..."></label><div class="split"><label>Categoria<select><option>Muebles</option><option>Electrodomesticos</option><option>Computadoras</option><option>Celulares</option><option>Herramientas</option><option>Oficina</option><option>Ropa</option><option>Otros</option></select></label><label>Precio<input type="number" min="0" placeholder="150"></label></div><label>Estado del producto<select><option>Nuevo sin uso</option><option>Muy bueno</option><option>Bueno</option><option>Usado funcional</option><option>Para reparar</option></select></label><label>Descripcion<textarea required></textarea></label><div class="split"><label>Ciudad<input value="Huanuco"></label><label>Zona<input placeholder="Centro"></label></div><div class="split"><label>Metodo de entrega<select><option>Punto publico</option><option>Recojo coordinado</option><option>Delivery local</option></select></label><label>Metodo de pago<select><option>Yape fase futura</option><option>Plin fase futura</option><option>Transferencia fase futura</option><option>Tarjeta fase futura</option></select></label></div><label>Fotos obligatorias<input type="file" accept="image/*" multiple required></label><label><input type="checkbox" required> Acepto recomendaciones de seguridad</label><button class="btn">Publicar producto</button></form><aside class="notice"><h3>Advertencia antiestafa</h3><p>Revisa el producto antes de pagar, evita adelantos sospechosos, prefiere lugares publicos y revisa la reputacion del vendedor.</p></aside></div></section></main><footer class="footer" data-footer></footer><div data-chatbot></div><script type="module">import{layout}from"../js/script.js";layout("Publicar producto");</script></body></html>
