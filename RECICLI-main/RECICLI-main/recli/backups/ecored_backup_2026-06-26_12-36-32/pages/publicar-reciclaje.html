<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Publicar reciclaje</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/responsive.css"></head><body><header class="navbar" data-nav></header><main><section class="page-hero"><div class="container"><h1>Publicar material reciclable</h1><p class="lead">Simple, local y conectado con campanas o empresas recicladoras verificadas.</p></div></section><section class="section"><div class="container grid two"><form class="card form"><label>Tipo de material<select><option>Papel/carton</option><option>Plastico PET</option><option>Vidrio</option><option>Metal</option><option>Otros</option></select></label><div class="split"><label>Cantidad aproximada<input type="number" min="1" placeholder="20"></label><label>Unidad<select><option>kg</option><option>bolsas</option><option>unidades</option></select></label></div><div class="split"><label>Ciudad<input value="Huanuco"></label><label>Zona<input placeholder="Amarilis Norte"></label></div><label>Disponibilidad de recojo<select><option>Manana</option><option>Tarde</option><option>Fin de semana</option></select></label><label>Foto opcional<input type="file" accept="image/*"></label><label>Observaciones<textarea placeholder="Material limpio, separado, listo para recojo"></textarea></label><button class="btn">Publicar material</button></form><aside class="card"><h3>Acciones rapidas</h3><p>Tambien puedes unirte a una campana activa o afiliarte a una empresa recicladora.</p><button class="btn secondary">Unirme a campana</button><button class="btn ghost">Afiliarme a empresa</button></aside></div></section></main><footer class="footer" data-footer></footer><div data-chatbot></div><script type="module">import{layout}from"../js/script.js";layout("Publicar reciclaje");</script></body></html>
