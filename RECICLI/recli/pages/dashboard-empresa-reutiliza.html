<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Empresa Reutiliza</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="navbar" data-nav></header>
  <main>
    <section class="page-hero"><div class="container"><h1>Dashboard Empresa Reutiliza</h1><p class="lead">Productos, destacados y actividad conectada a Supabase.</p></div></section>
    <section class="section">
      <div class="container dashboard-shell">
        <aside class="sidebar"><a href="#resumen">Resumen</a><a href="#destacados">Destacados</a><a href="#reputacion">Reputacion</a></aside>
        <div class="grid">
          <section id="dashboardStats" class="dashboard-grid"></section>
          <section id="destacados"><h2>Productos destacados</h2><div id="liquidacionEmpresa" class="grid two"></div></section>
          <section class="card"><h2>Regla comercial</h2><p>Una empresa puede activar modulos separados para Recicla y Reutiliza segun su verificacion en Supabase.</p></section>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer" data-footer></footer>
  <div data-chatbot></div>
  <script type="module">
    import { layout } from "../js/script.js";
    import { initDashboard } from "../js/dashboard.js";
    layout("Dashboard Reutiliza");
    await initDashboard();
  </script>
</body>
</html>
