<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="navbar" data-nav></header>
  <main>
    <section class="page-hero"><div class="container"><h1>Panel admin</h1><p class="lead">Verifica empresas, revisa reportes, detecta spam y controla publicaciones desde Supabase.</p></div></section>
    <section class="section">
      <div class="container dashboard-shell">
        <aside class="sidebar"><a>Empresas</a><a>Reportes</a><a>Mensajes</a><a>Usuarios</a><a>Publicaciones</a></aside>
        <div class="grid">
          <section id="adminStats" class="dashboard-grid"></section>
          <section class="card">
            <h2>Control</h2>
            <label class="form">Filtro
              <select id="adminFilter">
                <option value="todo">Todo</option>
                <option value="empresas">Empresas por verificar</option>
                <option value="reportes">Reportes</option>
                <option value="mensajes">Mensajes de contacto</option>
                <option value="spam">Spam / bloqueo</option>
              </select>
            </label>
          </section>
          <section><h2>Cola de revision</h2><div id="adminQueue" class="grid two"></div></section>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer" data-footer></footer>
  <div data-chatbot></div>
  <script type="module">
    import { layout } from "../js/script.js";
    import { initAdmin } from "../js/admin.js";
    layout("Admin");
    await initAdmin();
  </script>
</body>
</html>
