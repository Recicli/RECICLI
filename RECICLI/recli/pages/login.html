<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicia en Eco</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <header class="navbar" data-nav></header>
  <main class="auth-main">
    <section class="auth-shell">
      <div class="auth-panel">
        <span class="eyebrow">Bienvenido a EcoRed</span>
        <h1>Inicia en Eco</h1>
        <p class="lead">Entra a tu cuenta para publicar, participar en campanas y ver tu EcoScore.</p>

        <form id="loginForm" class="form auth-form">
          <label>Correo
            <input name="email" type="email" placeholder="tu-correo@ecored.pe" autocomplete="email" required>
          </label>
          <label>Contrasena
            <input name="password" type="password" placeholder="Tu contrasena" autocomplete="current-password" required>
          </label>
          <label>Entrar como
            <select id="loginRole"></select>
          </label>
          <button class="btn eco-login-cta" type="submit">Iniciar sesion</button>
          <p id="loginMessage" class="mini-result"></p>
        </form>

        <div class="auth-switch">
          <span>No tienes cuenta?</span>
          <a class="btn secondary" href="registro.html">Registrate</a>
        </div>
      </div>

      <aside class="auth-visual">
        <div class="auth-carousel">
          <article style="--bg:url('../assets/img/event-river.svg')"><strong>Eventos</strong><span>Participa en acciones locales</span></article>
          <article style="--bg:url('../assets/img/campaign-pet.svg')"><strong>Recicla</strong><span>Conecta con campanas por ciudad</span></article>
          <article style="--bg:url('../assets/img/product-laptop.svg')"><strong>Reutiliza</strong><span>Dale segunda vida a productos</span></article>
        </div>
      </aside>
    </section>
  </main>
  <footer class="footer" data-footer></footer>
  <div data-chatbot></div>
  <script type="module">
    import { layout } from "../js/script.js";
    import { initLogin } from "../js/auth.js";
    layout("Inicia en Eco");
    initLogin();
  </script>
</body>
</html>
