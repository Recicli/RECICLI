<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar EcoRed</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <header class="navbar" data-nav></header>
  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Explorar EcoRed</h1>
        <p class="lead">Dos caminos simples: recuperar materiales o dar segunda vida a productos.</p>
      </div>
    </section>
    <section class="section organic-section">
      <div class="container grid two">
        <a class="explore-option compact-explore" style="--bg:url('../assets/img/explore-recicla.svg')" href="recicla.html">
          <span class="tag">Recupera materiales</span>
          <h2>Recicla</h2>
          <div class="rotating-copy" data-phrases="Publica por kilos|Conecta con empresas|Agenda recojos|Mide tu impacto">Publica por kilos</div>
          <span class="btn secondary">Entrar</span>
        </a>
        <a class="explore-option light compact-explore" style="--bg:url('../assets/img/explore-reutiliza.svg')" href="reutiliza.html">
          <span class="tag">Segunda vida</span>
          <h2>Reutiliza</h2>
          <div class="rotating-copy" data-phrases="Vende sin desperdiciar|Compra circular|Destaca productos|Evita estafas">Vende sin desperdiciar</div>
          <span class="btn">Entrar</span>
        </a>
      </div>
    </section>
  </main>
  <footer class="footer" data-footer></footer>
  <div data-chatbot></div>
  <script type="module">
    import { layout } from "../js/script.js";
    layout("Explorar");
    document.querySelectorAll(".rotating-copy").forEach((node) => {
      const phrases = node.dataset.phrases.split("|");
      let index = 0;
      setInterval(() => {
        index = (index + 1) % phrases.length;
        node.classList.remove("phrase-in");
        window.requestAnimationFrame(() => {
          node.textContent = phrases[index];
          node.classList.add("phrase-in");
        });
      }, 2000);
    });
  </script>
</body>
</html>
