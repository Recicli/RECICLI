<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <header class="navbar" data-nav></header>
  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Eventos ambientales</h1>
        <p class="lead">ONGs, municipalidades y universidades pueden crear convocatorias gratuitas en Recicla.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <div id="eventosGrid" class="grid three"></div>
      </div>
    </section>
  </main>
  <footer class="footer" data-footer></footer>
  <div data-chatbot></div>
  <script type="module">
    import { layout } from "../js/script.js";
    import { eventos } from "../data/eventos.js";

    layout("Eventos");
    document.querySelector("#eventosGrid").innerHTML = eventos.map((e) => `
      <article class="card">
        <img class="card-media" src="${e.imagen}" alt="${e.titulo}">
        <span class="tag">${e.tipo}</span>
        <h3>${e.titulo}</h3>
        <p>${e.organizador} - ${e.ciudad}</p>
        <p>Fecha: ${e.fecha}</p>
        <p>Meta: ${e.metaKg} kg - Participantes: ${e.participantes}</p>
        <button class="btn">Unirse</button>
      </article>
    `).join("");
  </script>
</body>
</html>
